quarkus.application.name=post-service
quarkus.http.port=8082

# =============================
# OpenTelemetry / Grafana LGTM
# =============================
# In dev, Quarkus runs on the host and exports telemetry to the LGTM stack in compose.yaml.
%dev.quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
%test.quarkus.otel.enabled=false
quarkus.otel.logs.enabled=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.http-server.enabled=true
quarkus.log.console.json.enabled=true
quarkus.log.console.json.exception-output-type=formatted

# =============================
# HTTP Access Logging
# =============================
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern={"remoteHost":"%h","method":"%m","path":"%U","status":%s,"bytes":%b}

quarkus.rest-client.user-service.url=http://localhost:8081

# =============================
# Stage 7 unbiased-post agent
# =============================
# Pepper uses Quarkus LangChain4j's named OpenAI-compatible model and xAI's Responses API. The key
# remains server-side and may be supplied as an environment variable in dev/deployments.
agent.grok.api-key=${XAI_API_KEY:__not_configured__}
agent.grok.model=grok-4.3
agent.grok.reasoning-effort=low
agent.grok.max-output-tokens=4000
quarkus.langchain4j.openai.chat-model.enabled=true
quarkus.langchain4j.openai.chat-model.mode=responses
quarkus.langchain4j.openai.grok.base-url=https://api.x.ai/v1
quarkus.langchain4j.openai.grok.api-key=${agent.grok.api-key}
quarkus.langchain4j.openai.grok.timeout=300s
quarkus.langchain4j.openai.grok.max-retries=1
quarkus.langchain4j.openai.grok.chat-model.model-name=${agent.grok.model}
quarkus.langchain4j.openai.grok.chat-model.reasoning-effort=${agent.grok.reasoning-effort}
quarkus.langchain4j.openai.grok.chat-model.strict-json-schema=true
quarkus.langchain4j.openai.grok.chat-model.responses.max-output-tokens=${agent.grok.max-output-tokens}
quarkus.langchain4j.openai.grok.chat-model.responses.include=no_inline_citations
quarkus.langchain4j.openai.grok.chat-model.responses.prompt-cache-key=unbiased-post-v1
agent.jobs.poll-interval=2s
agent.jobs.max-attempts=3

# =============================
# CORS Configuration
# =============================
# The Expo web app (http://localhost:5173) calls post-service cross-origin (feed, create, presign),
# so CORS must be enabled here just as it is in user-service.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=86400

# =============================
# Keycloak / OIDC Configuration
# =============================
%dev.quarkus.oidc.application-type=service
%dev.quarkus.oidc.client-id=app-backend
%dev.quarkus.oidc.credentials.secret=qicn9w2mfO9U6m7SyZsND33e6k9osCYl
%dev.quarkus.oidc.auth-server-url=http://localhost:8080/realms/your-say-news
# Resolve the authenticated subject to the EMAIL claim, not preferred_username. The author lookup
# (user-service getUserByEmail) keys on email; without this, getName() returns the username
# (e.g. "john.doe") and the lookup 404s, failing post creation with "Unknown author".
%dev.quarkus.oidc.token.principal-claim=email
# We run a real Keycloak (compose) at auth-server-url; never start a Keycloak Dev Services container
# (it races for port 8080 and fails when all dev processes start together via `bun run dev`).
quarkus.keycloak.devservices.enabled=false

# Allow Dev UI and other /q/* stuff in dev
%dev.quarkus.http.auth.permission.dev-ui.paths=/q/*
%dev.quarkus.http.auth.permission.dev-ui.policy=permit

quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated
# Exclude OPTIONS so CORS preflight (sent without a bearer token) isn't rejected by auth
# before the CORS filter can answer it.
quarkus.http.auth.permission.authenticated.methods=GET,POST,PUT,DELETE,PATCH,HEAD
quarkus.http.auth.permission.public.paths=/live,/q/health/*
quarkus.http.auth.permission.public.policy=permit

# =============================
# Datasource (Postgres)
# =============================
# In dev, talk to the shared compose Postgres (the one migrate/seed populate) rather than a
# throwaway Dev Services container, so the running app sees the seeded data. post-service is
# reactive (Hibernate Reactive) AND uses JDBC for Liquibase, so both URLs are set. user-service
# mirrors this with a JDBC-only %dev block.
quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=app_user
%dev.quarkus.datasource.password=app_password
%dev.quarkus.datasource.reactive.url=postgresql://localhost:5432/app_db
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/app_db

# =============================
# Vote sentiment aggregation
# =============================
# k-anonymity suppression threshold for by-characteristic sentiment breakdowns: any bucket whose
# total vote count is below this is withheld from results. MVP1 ships k=0 (no suppression) — the
# single config flip that hardens against small-bucket re-identification (see roadmap risk #1).
votes.aggregation.suppress-below=0

# Dev UI Configuration
%dev.quarkus.devservices.devui.open-browser=true

quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/db.changelog-master.xml
quarkus.liquibase.enabled=true
# Liquibase owns the schema on the shared app_db. Hibernate must NOT generate it — dev mode otherwise
# defaults to drop-and-create, which would drop/recreate post tables (and a stray Vote table) and
# fight Liquibase / wipe seed data.
quarkus.hibernate-orm.database.generation=none
# CharacteristicSnapshot is all-String so the global REST Jackson ObjectMapper is fine for JSONB
# serialization — no date/type ambiguity exists. This suppresses Quarkus's compatibility check.
quarkus.hibernate-orm.mapping.format.global=ignore

# Reduce Liquibase logging
quarkus.log.category."liquibase".level=OFF
quarkus.log.category."liquibase.changelog".level=OFF
quarkus.log.category."liquibase.lockservice".level=OFF
quarkus.log.category."liquibase.executor".level=OFF
quarkus.log.category."liquibase.database".level=OFF




# Point AWS SDK to LocalStack
quarkus.s3.endpoint-override=http://localhost:4566
quarkus.s3.aws.region=us-east-1
quarkus.s3.aws.credentials.type=static
quarkus.s3.aws.credentials.static-provider.access-key-id=test
quarkus.s3.aws.credentials.static-provider.secret-access-key=test

# Required for LocalStack path-style
quarkus.s3.path-style-access=true

# Bucket holding post media (images/videos). Matches localstack/init-aws.sh.
posts.media.bucket=post-videos
