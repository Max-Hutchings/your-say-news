databaseChangeLog:
  - changeSet:
      id: 0003-add-consent-to-user
      author: mhutc
      logicalFilePath: db/migrations/0003-add-consent-to-user.yaml
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addColumn:
            tableName: your_say_user
            columns:
