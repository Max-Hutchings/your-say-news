# =============================
# Test profile
# =============================
# Tests run against a REAL Postgres provided by Quarkus Dev Services (Testcontainers).
# No datasource URL is configured for %test, so Dev Services starts a throwaway
# Postgres container automatically — both the JDBC (Liquibase) and reactive clients use it.
%test.quarkus.datasource.db-kind=postgresql

# Liquibase runs the schema migrations so the post/post_media tables exist for the tests.
%test.quarkus.liquibase.enabled=true
%test.quarkus.liquibase.migrate-at-start=true
%test.quarkus.liquibase.change-log=db/db.changelog-master.xml

# OIDC off in tests — auth is exercised via @TestSecurity.
%test.quarkus.oidc.enabled=false

# MongoDB is not used in Stage 3 vote tests — don't spin up a container for it.
%test.quarkus.mongodb.devservices.enabled=false

%test.quarkus.hibernate-orm.database.generation=none

# S3 isn't reached in tests (the S3Presigner is mocked), but give the SDK static creds/region
# so bean wiring succeeds without contacting AWS.
%test.quarkus.s3.aws.region=us-east-1
%test.quarkus.s3.aws.credentials.type=static
%test.quarkus.s3.aws.credentials.static-provider.access-key-id=test
%test.quarkus.s3.aws.credentials.static-provider.secret-access-key=test
%test.posts.media.bucket=post-videos
