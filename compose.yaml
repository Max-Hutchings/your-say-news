# compose.yaml
services:
  # 1) App Postgres - Database for user-service and post-service
  postgres:
    image: postgres:16
    container_name: app-postgres
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - app-postgres-data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2) Postgres for Keycloak
  keycloak-db:
    image: postgres:16
    container_name: keycloak-postgres
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
      POSTGRES_DB: keycloak
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3) Keycloak auth provider with auto-imported realm
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: keycloak
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    command:
      - "start-dev"
      - "--import-realm"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000;echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # 4) Reconcile seeded users after startup import (which skips an already-persisted realm)
  keycloak-seed-users:
    image: python:3.13-alpine
    container_name: keycloak-seed-users
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: ["python", "/config/sync-seed-users.py"]
    volumes:
      - ./keycloak/realm-export.json:/config/realm-export.json:ro
      - ./keycloak/sync-seed-users.py:/config/sync-seed-users.py:ro
    networks:
      - app-net
    restart: "no"

  # 5) Liquibase migrations - applies schema (migrations/) for every service, then exits
  liquibase-migrate:
    build:
      context: .
      dockerfile: liquibase/Dockerfile.migrate
    container_name: liquibase-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/app_db
      DB_USERNAME: app_user
      DB_PASSWORD: app_password
    networks:
      - app-net
    restart: "no"

  # 6) Liquibase seeding - applies seed data (seeding/, context "seed") after migrations, then exits
  liquibase-seed:
    build:
      context: .
      dockerfile: liquibase/Dockerfile.seed
    container_name: liquibase-seed
    depends_on:
      liquibase-migrate:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/app_db
      DB_USERNAME: app_user
      DB_PASSWORD: app_password
    networks:
      - app-net
    restart: "no"

  # 7) LocalStack for S3 (used by post-service for video storage)
  localstack:
    image: localstack/localstack:3.0
    container_name: localstack
    ports:
      - "4566:4566"            # LocalStack Gateway
      - "4510-4559:4510-4559"  # External services port range
    environment:
      - SERVICES=s3
      - DEBUG=0
      - PERSISTENCE=1
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - localstack-data:/var/lib/localstack
      - ./localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh:ro
    networks:
      - app-net

  # 8) Local observability stack: Grafana UI, OTel Collector, Loki, Tempo, and Prometheus
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: otel-lgtm
    ports:
      - "3000:3000" # Grafana
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    volumes:
      - otel-lgtm-data:/data
      - ./grafana/provisioning/dashboards/your-say-news.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/your-say-news.yaml:ro
      - ./grafana/dashboards:/otel-lgtm/your-say-news-dashboards:ro
    networks:
      - app-net

networks:
  app-net:

volumes:
  app-postgres-data:
  keycloak-postgres-data:
  localstack-data:
  otel-lgtm-data:
