# Dev runner: starts local infrastructure and all dev processes in one TUI.
#
# Run: bun run dev
#
# Panes (focus with arrows / mouse):
#   - compose      : Postgres, Keycloak, LocalStack, Liquibase, and telemetry
#   - user-service : Quarkus dev mode on :8081 (hot reload)
#   - post-service : Quarkus dev mode on :8082 (hot reload)
#   - expo         : Expo / React Native dev server on :5173
#
# Keys: 'r' rebuilds and restarts the full Compose stack, 'x' stops the focused
# process, and 'q' quits everything. Because Compose is managed by mprocs,
# quitting also runs `docker compose down`.
# Before each application process starts, any existing listener on its assigned
# port is terminated so stale dev processes cannot block startup.

procs:
  compose:
    shell: "docker compose up --build"
    stop:
      cmd: "docker compose down"

  user-service:
    shell: "./scripts/free-service-port.sh 8081 user-service && ./scripts/check-compose-services.sh && ./gradlew :user-service:quarkusDev --console=plain"

  post-service:
    shell: "./scripts/free-service-port.sh 8082 post-service && ./scripts/check-compose-services.sh && ./gradlew :post-service:quarkusDev --console=plain"

  expo:
    cwd: "frontend/mobile/your-say-news"
    shell: "../../../scripts/free-service-port.sh 5173 expo && ../../../scripts/check-compose-services.sh && bun run start"

# Restarting the Compose pane runs its stop command first (`docker compose
# down`), then starts it again with `--build`. Bind this in both panes so `r`
# behaves consistently regardless of which side of the TUI is focused.
keymap_procs:
  <r>:
    c: batch
    cmds:
      - { c: select-proc, index: 0 }
      - { c: restart-proc }

keymap_term:
  <r>:
    c: batch
    cmds:
      - { c: focus-procs }
      - { c: select-proc, index: 0 }
      - { c: restart-proc }
