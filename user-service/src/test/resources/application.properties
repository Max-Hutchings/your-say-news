# =============================
# Test profile
# =============================
# Tests run against a REAL Postgres provided by Quarkus Dev Services (Testcontainers).
# No datasource URL is configured for %test, so Dev Services starts a throwaway
# Postgres container automatically — no manual Testcontainers setup needed.
%test.quarkus.datasource.db-kind=postgresql

# Liquibase: run schema migrations AND seed data so tests have the expected fixtures.
# (The app's master changelog is migrations-only; the test changelog adds seeding.)
%test.quarkus.liquibase.enabled=true
%test.quarkus.liquibase.migrate-at-start=true
%test.quarkus.liquibase.change-log=db/db.changelog-test.yaml

# OIDC off in tests — auth is exercised via @TestSecurity.
%test.quarkus.oidc.enabled=false
