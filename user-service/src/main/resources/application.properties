
quarkus.application.name=user-service
quarkus.devservices.enabled=true

# =============================
# OpenTelemetry / Grafana LGTM
# =============================
# In dev, Quarkus runs on the host and exports telemetry to the LGTM stack in compose.yaml.
%dev.quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
%test.quarkus.otel.enabled=false
quarkus.otel.logs.enabled=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.http-server.enabled=true
quarkus.log.console.json.enabled=true
quarkus.log.console.json.exception-output-type=formatted

# =============================
# HTTP Access Logging
# =============================
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern={"remoteHost":"%h","method":"%m","path":"%U","status":%s,"bytes":%b}

# Liquibase Configuration
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/db.changelog-master.yaml
quarkus.liquibase.enabled=true
# NB: clean-at-start runs Liquibase drop-all on the SHARED app_db, which deletes post-service's
# tables (post, post_media) and seed data too — never enable it on a shared database. Liquibase
# migrations own the schema; Hibernate must not generate it (dev mode defaults to drop-and-create).
quarkus.hibernate-orm.database.generation=none




# Service URLs
service.user-service = http://localhost:8081
service.user-characteristic-service = http://localhost:8083
service.post-service = http://localhost:8082
service.vote-service = http://localhost:8084

quarkus.http.port=8081

# =============================
# CORS Configuration
# =============================

# Enable CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=86400


# =============================
# Keycloak / OIDC Configuration
# =============================

%dev.quarkus.oidc.application-type=service
%dev.quarkus.oidc.client-id=app-backend
%dev.quarkus.oidc.credentials.secret=qicn9w2mfO9U6m7SyZsND33e6k9osCYl

# Allow Dev UI and other /q/* stuff in dev
%dev.quarkus.http.auth.permission.dev-ui.paths=/q/*
%dev.quarkus.http.auth.permission.dev-ui.policy=permit

%dev.quarkus.oidc.auth-server-url=http://localhost:8080/realms/your-say-news
# Use the EMAIL claim as the principal name: user records (and the seed) key on email, so
# getName() must be the email, not preferred_username (e.g. "john.doe").
%dev.quarkus.oidc.token.principal-claim=email
# We run a real Keycloak (compose) at auth-server-url; never start a Keycloak Dev Services container.
quarkus.keycloak.devservices.enabled=false

quarkus.http.auth.permission.authenticated.paths=/*,
quarkus.http.auth.permission.authenticated.policy=authenticated
# Exclude OPTIONS so CORS preflight (sent without a bearer token) isn't rejected by auth
# before the CORS filter can answer it.
quarkus.http.auth.permission.authenticated.methods=GET,POST,PUT,DELETE,PATCH,HEAD
quarkus.http.auth.permission.public.paths=/live,/q/health/*
quarkus.http.auth.permission.public.policy=permit


# =============================
# Shared datasource config
# =============================
quarkus.datasource.db-kind=postgresql
#quarkus.datasource.devservices.enabled=false

# =============================
# Dev profile - use docker-compose Postgres
# =============================
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/app_db
%dev.quarkus.datasource.username=app_user
%dev.quarkus.datasource.password=app_password



# =============================
# Prod Deployment
# =============================
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.devservices.reuse=true
%prod.quarkus.datasource.devservices.show-logs=false
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:32785/quarkus?loggerLevel=OFF
%prod.quarkus.datasource.password=quarkus
%prod.quarkus.datasource.reactive.url=vertx-reactive:postgresql://localhost:32785/quarkus?loggerLevel=OFF
%prod.quarkus.datasource.username=quarkus
